name: Build Zensical Site on Pull Request

on:
  pull_request:
    branches:
      - main
    paths:
      - 'docs/**'
      - 'zensical.toml'
      - '.github/workflows/zensical-pr.yml'

jobs:
  build:
    name: Build documentation site
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install zensical

      - name: Build site
        run: zensical build

      - name: Upload site artifact
        uses: actions/upload-artifact@v4
        with:
          name: zensical-site
          path: site/
          retention-days: 30
          if-no-files-found: error

      - name: Comment on PR with artifact info
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '✅ Documentation site built successfully!\n\n**Artifact:** `zensical-site` - Download to preview the built site.'
            })
