name: Documentation Build Zensical Site on Pull Request

on:
  pull_request:
    branches:
      - main
    paths:
      - 'docs/**'
      - 'zensical.toml'
      - '.github/workflows/zensical-pr.yml'

permissions:
  contents: read
  pull-requests: write

jobs:
  deploy:
    name: Build documentation site
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v5
        with:
          python-version: 3.x
      - run: pip install zensical
      - run: zensical build --clean

      - name: Upload site artifact
        uses: actions/upload-artifact@v4
        with:
          name: zensical-site
          path: site/
          retention-days: 3
          if-no-files-found: error

      - name: Comment on PR with artifact info
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '✅ Documentation site built successfully!\n\n**Artifact:** `zensical-site` - Download to preview the built site.'
            })
