# Zensical Configuration
# Documentation: https://zensical.org/docs/setup/basics/

[project]

# Site metadata
site_name = "GeoKrety Stats specs"
site_description = "Technical specifications and implementation guides for GeoKrety analytics and database systems."
site_author = "GeoKrety Team"
site_url = "https://geokrety.github.io/geokrety-stats/"
repo_url = "https://github.com/geokrety/geokrety-stats"
repo_name = "geokrety/geokrety-stats"
copyright = "2026 GeoKrety Team"
language = "en"
nav = [
 	{ Home = "index.md" },
 	{ "Schema: GeoKrety Stats" = "schema/specs.md" },
 	{ "Log At Home" = "log-at-home/index.md" },
 	{ "Type GKID" = "type-gkid/specification.md" },
 	{ "Types labels" = "types-labels/specification.md" },
	{ "Pagination/Sort" = "pagination/specification.md" },
 	{ "Legacy: Gamification Draft" = "gamification/00-SPEC-DRAFT-v1.md" },
]

[project.theme]
primary = "indigo"
accent = "indigo"
features = [
	"navigation.sections",
	"navigation.indexes",
	"navigation.path",
	"toc.follow",
	"content.code.copy",
]

# Palette toggle for automatic mode
[[project.theme.palette]]
media = "(prefers-color-scheme)"
toggle.icon = "lucide/sun-moon"
toggle.name = "Switch to light mode"

# Palette toggle for light mode
[[project.theme.palette]]
media = "(prefers-color-scheme: light)"
scheme = "default"
toggle.icon = "lucide/sun"
toggle.name = "Switch to dark mode"

# Palette toggle for dark mode
[[project.theme.palette]]
media = "(prefers-color-scheme: dark)"
scheme = "slate"
toggle.icon = "lucide/moon"
toggle.name = "Switch to system preference"
