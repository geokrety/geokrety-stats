openapi: 3.0.3

info:
  title: GeoKrety Stats API
  version: 3.1.0
  description: |
    Read-only API for GeoKrety resource exploration.

    The `/api/v3/...` contract is JSON REST based: every JSON response uses top-level `data`, `meta`, and `links`, while resource objects expose `id`, `type`, `attributes`, optional `relationships`, and resource-scoped `links.self`.
    Collection endpoints are cursor-first for now: clients send `limit`, follow `links.next`, and continue while `meta.has_more` is true. Search endpoints require a `q` query parameter of at least 2 characters.
    The public API surface was intentionally reduced during the big-bang migration: redundant activity, stats, alias, and visualization endpoints were removed so the stable contract centers on core resources and scoped collections.

    ## GeoKret Public Identifiers (GKID)

    GeoKrety endpoints accept public identifiers in three forms:
    - **Numeric decimal**: `1`, `123`, `65535` (direct GKID number)
    - **Bare hexadecimal**: `0001`, `00FF`, `FFFF` (hex without the `GK` prefix)
    - **GK-prefixed hexadecimal**: `GK0001`, `GK00FF`, `GKFFFF` (padded hex representation)

    Bare digit-only values without a leading zero are treated as decimal.
    Zero-padded digit-only values are treated as hexadecimal.

    All forms resolve to the same GeoKret object. Examples:
    - `/api/v3/geokrety/1` and `/api/v3/geokrety/GK0001` fetch the same GeoKret
    - `/api/v3/geokrety/00FF` and `/api/v3/geokrety/GK00FF` fetch the same GeoKret
    - `/api/v3/geokrety/255` and `/api/v3/geokrety/GK00FF` are equivalent

