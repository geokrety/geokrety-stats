openapi: 3.0.3

info:
  title: GeoKrety Stats API
  version: 3.1.0
  description: |
    Read-only API for GeoKrety statistics, activity feeds, entity exploration, and visualization workloads.

    Every `/api/v3/...` JSON endpoint returns a response envelope with `data` and `meta`.
    List endpoints support `limit` and `offset` pagination. Search endpoints require a `q` query parameter of at least 2 characters.

    ## GeoKret Public Identifiers (GKID)

    GeoKrety endpoints accept public identifiers in three forms:
    - **Numeric decimal**: `1`, `123`, `65535` (direct GKID number)
    - **Bare hexadecimal**: `0001`, `00FF`, `FFFF` (hex without the `GK` prefix)
    - **GK-prefixed hexadecimal**: `GK0001`, `GK00FF`, `GKFFFF` (padded hex representation)

    All forms resolve to the same GeoKret object. Examples:
    - `/api/v3/geokrety/1` and `/api/v3/geokrety/GK0001` fetch the same GeoKret
    - `/api/v3/geokrety/00FF` and `/api/v3/geokrety/GK00FF` fetch the same GeoKret
    - `/api/v3/geokrety/255` and `/api/v3/geokrety/GK00FF` are equivalent

servers:
  - url: http://192.168.130.65:7415
    description: Local network development server
  - url: http://localhost:7415
    description: Local development server

tags:
  - name: System
    description: Service metadata, health checks, metrics, and websocket entrypoint
  - name: Stats
    description: Global graph and leaderboard datasets
  - name: Geokrety
    description: GeoKret entity details, feeds, graphs, and map payloads
  - name: Countries
    description: Country-level aggregates and currently spotted GeoKrety
  - name: Waypoints
    description: Waypoint search, details, and spotted or historical GeoKrety
  - name: Users
    description: User details, activity, relationships, collections, and graphs
  - name: Pictures
    description: Read-only picture metadata

