JsonRestResourceLinks:
  type: object
  additionalProperties: false
  properties:
    self:
      type: string
    related:
      type: string

JsonRestDocumentLinks:
  type: object
  additionalProperties: false
  properties:
    self:
      type: string
    next:
      type: string
    prev:
      type: string
      nullable: true
    first:
      type: string
    last:
      type: string

JsonRestIdentifier:
  type: object
  required:
  - type
  - id
  properties:
    type:
      type: string
    id:
      type: string

JsonRestRelationshipData:
  $ref: '#/components/schemas/JsonRestIdentifier'

JsonRestRelationship:
  type: object
  properties:
    data:
      $ref: '#/components/schemas/JsonRestRelationshipData'
    links:
      $ref: '#/components/schemas/JsonRestResourceLinks'

JsonRestPageMeta:
  type: object
  properties:
    type:
      type: string
      enum:
      - cursor
      - page
    limit:
      type: integer
    has_more:
      type: boolean
    number:
      type: integer
    size:
      type: integer
    total_items:
      type: integer
    total_pages:
      type: integer

JsonRestQueryMeta:
  type: object
  properties:
    filters:
      type: object
      additionalProperties: true
    sort:
      type: string

JsonRestFilterCapability:
  type: object
  properties:
    type:
      type: string
    multi:
      type: boolean
    values:
      type: array
      items:
        type: string
    operators:
      type: array
      items:
        type: string

JsonRestCapabilitiesMeta:
  type: object
  properties:
    filters:
      type: object
      additionalProperties:
        $ref: '#/components/schemas/JsonRestFilterCapability'
    sorts:
      type: array
      items:
        type: string

JsonRestMeta:
  type: object
  required:
  - execution_time_ms
  properties:
    execution_time_ms:
      type: integer
      description: Milliseconds spent handling the request.
    page:
      $ref: '#/components/schemas/JsonRestPageMeta'
    query:
      $ref: '#/components/schemas/JsonRestQueryMeta'
    capabilities:
      $ref: '#/components/schemas/JsonRestCapabilitiesMeta'

JsonRestErrorPayload:
  type: object
  required:
  - code
  - message
  properties:
    code:
      type: string
    message:
      type: string

JsonRestErrorDocument:
  type: object
  required:
  - error
  - timestamp
  properties:
    error:
      $ref: '#/components/schemas/JsonRestErrorPayload'
    timestamp:
      type: string
      format: date-time

JsonRestResource:
  type: object
  required:
  - id
  - type
  properties:
    id:
      type: string
    type:
      type: string
    attributes:
      type: object
      additionalProperties: true
    relationships:
      type: object
      additionalProperties:
        $ref: '#/components/schemas/JsonRestRelationship'
    links:
      $ref: '#/components/schemas/JsonRestResourceLinks'

JsonRestSingleDocument:
  type: object
  required:
  - data
  - meta
  - links
  properties:
    data:
      $ref: '#/components/schemas/JsonRestResource'
    included:
      type: array
      items:
        $ref: '#/components/schemas/JsonRestResource'
    meta:
      $ref: '#/components/schemas/JsonRestMeta'
    links:
      $ref: '#/components/schemas/JsonRestDocumentLinks'

