LimitParam:
  in: query
  name: limit
  description: Maximum number of items to return. Cursor-paginated endpoints default to 20 and reject values above the endpoint-specific maximum.
  required: false
  schema:
    type: integer
    minimum: 1
    maximum: 1000
    default: 20

CursorParam:
  in: query
  name: cursor
  description: Opaque cursor token returned in `links.next`. Do not construct or modify this value on the client.
  required: false
  schema:
    type: string

OffsetParam:
  in: query
  name: offset
  deprecated: true
  description: Zero-based starting offset for paginated responses. Default 0.
  required: false
  schema:
    type: integer
    minimum: 0
    default: 0

SearchQueryParam:
  in: query
  name: q
  description: Search text. Must be at least 2 characters long.
  required: true
  schema:
    type: string
    minLength: 2
  example: gk

GeokretIdsParam:
  in: query
  name: ids
  description: Optional comma-separated list of public GeoKret identifiers. When provided, the endpoint returns exactly the requested resources and ignores cursor pagination.
  required: false
  schema:
    type: string
    pattern: '^(?:\s*(?:[Gg][Kk])?0*[1-9A-Fa-f][0-9A-Fa-f]*\s*)(?:,\s*(?:[Gg][Kk])?0*[1-9A-Fa-f][0-9A-Fa-f]*\s*)*$'
  example: GK0001,GK00FF

MoveIdsParam:
  in: query
  name: ids
  description: Optional comma-separated list of numeric move identifiers. When provided, the endpoint returns exactly the requested move resources and ignores cursor pagination.
  required: false
  schema:
    type: string
    pattern: '^\s*[1-9][0-9]*(?:\s*,\s*[1-9][0-9]*)*\s*$'
  example: 10,11,15

CountryIdsParam:
  in: query
  name: ids
  description: Optional comma-separated list of ISO-3166 alpha-2 country codes. When provided, the endpoint returns exactly the requested country resources and ignores cursor pagination.
  required: false
  schema:
    type: string
    pattern: '^\s*[A-Za-z]{2}(?:\s*,\s*[A-Za-z]{2})*\s*$'
  example: PL,DE,FR

UserIdsParam:
  in: query
  name: ids
  description: Optional comma-separated list of numeric user identifiers. When provided, the endpoint returns exactly the requested user resources and ignores cursor pagination.
  required: false
  schema:
    type: string
    pattern: '^\s*[1-9][0-9]*(?:\s*,\s*[1-9][0-9]*)*\s*$'
  example: 1,42,99

PictureIdsParam:
  in: query
  name: ids
  description: Optional comma-separated list of numeric picture identifiers. When provided, the endpoint returns exactly the requested picture resources and ignores cursor pagination.
  required: false
  schema:
    type: string
    pattern: '^\s*[1-9][0-9]*(?:\s*,\s*[1-9][0-9]*)*\s*$'
  example: 5,6,7

GeokretIdParam:
  in: path
  name: gkid
  description: |
    GeoKret public identifier. Accepts numeric decimal (e.g., 1), bare
    hexadecimal (e.g., 00FF), or GK-prefixed hexadecimal format (e.g.,
    GK0001, GKFFFF).
    Parsing is case-insensitive. Bare digit-only values without a leading zero
    are treated as decimal, while zero-padded digit-only values are treated as
    hexadecimal.
  required: true
  schema:
    type: string
    pattern: '^(?:[Gg][Kk])?0*[1-9A-Fa-f][0-9A-Fa-f]*$'
  examples:
    numeric:
      value: '1'
      description: Numeric decimal form
    bareHex:
      value: '00FF'
      description: Hexadecimal form without the GK prefix
    hexPrefixed:
      value: 'GK0001'
      description: GK-prefixed hexadecimal form
    largeHex:
      value: 'GKFFFF'
      description: Maximum 16-bit hex value

MoveIdParam:
