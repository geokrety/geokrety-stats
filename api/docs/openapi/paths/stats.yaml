/api/v3/stats/kpis:
  get:
    tags:
    - Stats
    operationId: getStatsKpis
    summary: Global KPI counters
    responses:
      '200':
        description: Global KPI payload
        content:
          application/json:
            schema:
              allOf:
              - $ref: '#/components/schemas/EnvelopeBase'
              - type: object
                properties:
                  data:
                    $ref: '#/components/schemas/GlobalStats'
            example:
              data:
                totalGeokrety: 108950
                totalGeokretyHidden: 55368
                totalMoves: 6926419
                movesLast30Days: 19957
                registeredUsers: 36410
                activeUsers: 16
                activeUsersLast30d: 214
                countriesReached: 209
                picturesUploaded: 69213
              meta:
                requestedAt: '2026-03-16T20:47:17Z'
                queryMs: 90
                pagination:
                  limit: 1
                  offset: 0
                  count: 1
          application/xml:
            schema:
              allOf:
              - $ref: '#/components/schemas/EnvelopeBase'
              - type: object
                properties:
                  data:
                    $ref: '#/components/schemas/GlobalStats'
            example:
              data:
                totalGeokrety: 108950
                totalGeokretyHidden: 55368
                totalMoves: 6926419
                movesLast30Days: 19957
                registeredUsers: 36410
                activeUsers: 16
                activeUsersLast30d: 214
                countriesReached: 209
                picturesUploaded: 69213
              meta:
                requestedAt: '2026-03-16T20:47:17Z'
                queryMs: 90
                pagination:
                  limit: 1
                  offset: 0
                  count: 1
      '500':
        $ref: '#/components/responses/InternalServerError'
