/api/v3/geokrety/{gkid}:
  get:
    tags:
    - Geokrety
    operationId: getGeokret
    summary: GeoKret details
    description: Fetch full details for a single GeoKret by public identifier (GKID).
    parameters:
    - $ref: '#/components/parameters/GeokretIdParam'
    responses:
      '200':
        description: GeoKret detail payload
        content:
          application/json:
            schema:
              allOf:
              - $ref: '#/components/schemas/EnvelopeBase'
              - type: object
                properties:
                  data:
                    $ref: '#/components/schemas/GeokretDetails'
            example:
              data:
                id: 1
                gkid: GK0001
                name: Pierwszy GeoKret
                type: 0
                missing: false
                ownerId: 1
                ownerUsername: filips
                holderId: 1
                holderUsername: filips
                country: null
                waypoint: null
                lat: null
                lon: null
                lovesCount: 0
                picturesCount: 0
                bornAt: '2007-10-26T02:00:00+02:00'
                lastMoveAt: null
                geojson: null
                mission: Pierwszy GeoKret
                distanceKm: 0
                cachesCount: 0
                commentsHidden: false
              meta:
                requestedAt: '2026-03-16T20:47:17Z'
                queryMs: 2
                pagination:
                  limit: 1
                  offset: 0
                  count: 1
          application/xml:
            schema:
              allOf:
              - $ref: '#/components/schemas/EnvelopeBase'
              - type: object
                properties:
                  data:
                    $ref: '#/components/schemas/GeokretDetails'
            example:
              data:
                id: 1
                gkid: GK0001
                name: Pierwszy GeoKret
                type: 0
                missing: false
                ownerId: 1
                ownerUsername: filips
                holderId: 1
                holderUsername: filips
                country: null
                waypoint: null
                lat: null
                lon: null
                lovesCount: 0
                picturesCount: 0
                bornAt: '2007-10-26T02:00:00+02:00'
                lastMoveAt: null
                geojson: null
                mission: Pierwszy GeoKret
                distanceKm: 0
                cachesCount: 0
                commentsHidden: false
              meta:
                requestedAt: '2026-03-16T20:47:17Z'
                queryMs: 2
                pagination:
                  limit: 1
                  offset: 0
                  count: 1
      '400':
        $ref: '#/components/responses/BadRequest'
      '404':
        $ref: '#/components/responses/NotFound'
      '500':
        $ref: '#/components/responses/InternalServerError'
