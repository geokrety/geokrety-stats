/api/v3/geokrety:
  get:
    tags:
    - Geokrety
    operationId: listGeokrety
    summary: List GeoKrety
    description: 'Paginated list of GeoKrety. Results are ordered by activity (most
      recent moves first).

      '
    parameters:
    - $ref: '#/components/parameters/LimitParam'
    - $ref: '#/components/parameters/OffsetParam'
    responses:
      '200':
        description: Paginated GeoKrety list
        content:
          application/json:
            schema:
              allOf:
              - $ref: '#/components/schemas/EnvelopeBase'
              - type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/GeokretListItem'
          application/xml:
            schema:
              allOf:
              - $ref: '#/components/schemas/EnvelopeBase'
              - type: object
                properties:
