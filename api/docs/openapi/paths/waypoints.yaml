/api/v3/waypoints/search:
  get:
    tags:
    - Waypoints
    operationId: searchWaypoints
    summary: Search waypoints
    parameters:
    - $ref: '#/components/parameters/SearchQueryParam'
    - $ref: '#/components/parameters/LimitParam'
    - $ref: '#/components/parameters/OffsetParam'
    responses:
      '200':
        description: Matching waypoint summaries
        content:
          application/json:
            schema:
              allOf:
              - $ref: '#/components/schemas/EnvelopeBase'
              - type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/WaypointSummary'
            example:
              data:
              - id: 942858
                waypointCode: 1GC55T35
                source: UK
                country: DE
                lat: 53.59728
                lon: 10.04402
                geojson:
                  type: Point
                  coordinates:
                  - 10.04402
                  - 53.59728
              meta:
                requestedAt: '2026-03-16T20:47:24Z'
                queryMs: 1
                pagination:
                  limit: 1
                  offset: 0
                  count: 1
          application/xml:
            schema:
              allOf:
              - $ref: '#/components/schemas/EnvelopeBase'
              - type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/WaypointSummary'
            example:
              data:
              - id: 942858
                waypointCode: 1GC55T35
                source: UK
                country: DE
                lat: 53.59728
                lon: 10.04402
                geojson:
                  type: Point
                  coordinates:
                  - 10.04402
                  - 53.59728
              meta:
                requestedAt: '2026-03-16T20:47:24Z'
                queryMs: 1
                pagination:
                  limit: 1
                  offset: 0
                  count: 1
      '400':
        $ref: '#/components/responses/BadRequest'
      '500':
        $ref: '#/components/responses/InternalServerError'
