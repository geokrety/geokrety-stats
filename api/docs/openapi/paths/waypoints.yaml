/api/v3/waypoints/{code}:
  get:
    tags:
    - Waypoints
    operationId: getWaypoint
    summary: Waypoint details
    parameters:
    - $ref: '#/components/parameters/WaypointCodeParam'
    responses:
      '200':
        description: Waypoint detail payload
        content:
          application/json:
            schema:
              allOf:
              - $ref: '#/components/schemas/EnvelopeBase'
              - type: object
                properties:
                  data:
                    $ref: '#/components/schemas/WaypointDetails'
          application/xml:
            schema:
              allOf:
              - $ref: '#/components/schemas/EnvelopeBase'
              - type: object
                properties:
                  data:
                    $ref: '#/components/schemas/WaypointDetails'
      '400':
        $ref: '#/components/responses/BadRequest'
      '404':
        $ref: '#/components/responses/NotFound'
      '500':
        $ref: '#/components/responses/InternalServerError'
