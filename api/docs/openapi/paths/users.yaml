/api/v3/users:
  get:
    tags:
    - Users
    operationId: listUsers
    summary: List users
    description: 'Paginated list of users. Can be ordered by registration date, activity,
      or other ranking criteria.

      '
    parameters:
    - $ref: '#/components/parameters/LimitParam'
    - $ref: '#/components/parameters/OffsetParam'
    responses:
      '200':
        description: Paginated user list
        content:
          application/json:
            schema:
              allOf:
              - $ref: '#/components/schemas/EnvelopeBase'
              - type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/UserSearchResult'
          application/xml:
            schema:
              allOf:
              - $ref: '#/components/schemas/EnvelopeBase'
              - type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/UserSearchResult'
      '500':
        $ref: '#/components/responses/InternalServerError'
