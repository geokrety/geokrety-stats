openapi: 3.0.3
info:
  title: GeoKrety Stats API
  version: 3.0.0
  description: Read-only API for GeoKrety statistics, activity feeds, and visualization workloads.
servers:
  - url: http://localhost:7415
paths:
  /health:
    get:
      summary: Health check
      responses:
        '200':
          description: Service healthy
  /api/v3/stats/kpis:
    get:
      summary: Global KPI counters
      responses:
        '200':
          description: KPI payload
  /api/v3/stats/countries:
    get:
      summary: Country leaderboard and map aggregates
      parameters:
        - in: query
          name: limit
          schema: { type: integer, minimum: 1, maximum: 1000 }
        - in: query
          name: offset
          schema: { type: integer, minimum: 0 }
      responses:
        '200':
          description: Countries payload
  /api/v3/stats/leaderboard:
    get:
      summary: User leaderboard
      parameters:
        - in: query
          name: limit
          schema: { type: integer, minimum: 1, maximum: 1000 }
        - in: query
          name: offset
          schema: { type: integer, minimum: 0 }
      responses:
        '200':
          description: Leaderboard payload
  /api/v3/stats/hourly-heatmap:
    get:
      summary: Hourly activity heatmap cells for charts
      parameters:
        - in: query
          name: limit
          schema: { type: integer, minimum: 1, maximum: 1000 }
        - in: query
          name: offset
          schema: { type: integer, minimum: 0 }
      responses:
        '200':
          description: Hourly heatmap payload
  /api/v3/stats/country-flows:
    get:
      summary: Cross-country GeoKret flow records
      parameters:
        - in: query
          name: limit
          schema: { type: integer, minimum: 1, maximum: 1000 }
        - in: query
          name: offset
          schema: { type: integer, minimum: 0 }
      responses:
        '200':
          description: Country flow payload
  /api/v3/stats/top-caches:
    get:
      summary: Most visited waypoints globally
      parameters:
        - in: query
          name: limit
          schema: { type: integer, minimum: 1, maximum: 1000 }
        - in: query
          name: offset
          schema: { type: integer, minimum: 0 }
      responses:
        '200':
          description: Top caches payload
  /api/v3/stats/first-finder-leaderboard:
    get:
      summary: First-finder hall of fame
      parameters:
        - in: query
          name: limit
          schema: { type: integer, minimum: 1, maximum: 1000 }
        - in: query
          name: offset
          schema: { type: integer, minimum: 0 }
      responses:
        '200':
          description: First-finder leaderboard payload
  /api/v3/stats/distance-records:
    get:
      summary: Distance record leaderboard for GeoKrety
      parameters:
        - in: query
          name: limit
          schema: { type: integer, minimum: 1, maximum: 1000 }
        - in: query
          name: offset
          schema: { type: integer, minimum: 0 }
      responses:
        '200':
          description: Distance records payload
  /api/v3/geokrety/recent-moves:
    get:
      summary: Recent GeoKrety moves
      responses:
        '200':
          description: Recent moves payload
  /api/v3/geokrety/recent-born:
    get:
      summary: Recently created GeoKrety
      responses:
        '200':
          description: Recent born payload
  /api/v3/geokrety/recent-loved:
    get:
      summary: Recently loved GeoKrety
      responses:
        '200':
          description: Recent loved payload
  /api/v3/geokrety/recent-watched:
    get:
      summary: Recently watched GeoKrety
      responses:
        '200':
          description: Recent watched payload
  /api/v3/geokrety/{id}/timeline:
    get:
      summary: Milestone timeline for a single GeoKret
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer, minimum: 1 }
        - in: query
          name: limit
          schema: { type: integer, minimum: 1, maximum: 1000 }
        - in: query
          name: offset
          schema: { type: integer, minimum: 0 }
      responses:
        '200':
          description: GeoKret timeline payload
  /api/v3/geokrety/{id}/circulation:
    get:
      summary: Circulation summary for a single GeoKret
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer, minimum: 1 }
      responses:
        '200':
          description: GeoKret circulation payload
  /api/v3/countries/recent-active:
    get:
      summary: Recently active countries
      responses:
        '200':
          description: Active countries payload
  /api/v3/waypoints/recent-active:
    get:
      summary: Recently active waypoints
      responses:
        '200':
          description: Active waypoints payload
  /api/v3/users/recent-registered:
    get:
      summary: Recently registered users
      responses:
        '200':
          description: Recent registered users payload
  /api/v3/users/recent-active:
    get:
      summary: Recently active users
      responses:
        '200':
          description: Recent active users payload
  /api/v3/users/{id}/network:
    get:
      summary: Shared-GeoKret network edges for a user
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer, minimum: 1 }
        - in: query
          name: limit
          schema: { type: integer, minimum: 1, maximum: 1000 }
        - in: query
          name: offset
          schema: { type: integer, minimum: 0 }
      responses:
        '200':
          description: User network payload
components:
  schemas:
    Envelope:
      type: object
      properties:
        data:
          type: object
        meta:
          type: object
          properties:
            requestedAt: { type: string, format: date-time }
            queryMs: { type: integer }
            pagination:
              type: object
              properties:
                limit: { type: integer }
                offset: { type: integer }
                count: { type: integer }
