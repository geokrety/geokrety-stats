components:
  parameters:
    LimitParam:
      in: query
      name: limit
      description: Maximum number of items to return.
      required: false
      schema:
        type: integer
        minimum: 1
        maximum: 1000
        default: 20
    OffsetParam:
      in: query
      name: offset
      description: Zero-based starting offset for paginated responses.
      required: false
      schema:
        type: integer
        minimum: 0
        default: 0
    SearchQueryParam:
      in: query
      name: q
      description: Search text. Must be at least 2 characters long.
      required: true
      schema:
        type: string
        minLength: 2
      example: gk
    GeokretIdParam:
      in: path
      name: id
      description: Internal numeric GeoKret identifier.
      required: true
      schema:
        type: integer
        format: int64
        minimum: 1
    MoveIdParam:
      in: path
      name: moveId
      description: Internal numeric move identifier.
      required: true
      schema:
        type: integer
        format: int64
        minimum: 1
    UserIdParam:
      in: path
      name: id
      description: Internal numeric user identifier.
      required: true
      schema:
        type: integer
        format: int64
        minimum: 1
    CountryCodeParam:
      in: path
      name: code
      description: Uppercase ISO-3166 alpha-2 country code.
      required: true
      schema:
        type: string
        minLength: 2
        maxLength: 2
        pattern: '^[A-Z]{2}$'
      example: PL
    WaypointCodeParam:
      in: path
      name: code
      description: Waypoint code or source-specific cache identifier.
      required: true
      schema:
        type: string
        minLength: 2
        maxLength: 32
        pattern: '^[A-Za-z0-9_-]{2,32}$'
      example: GC12345
    PictureIdParam:
      in: path
      name: id
      description: Internal numeric picture identifier.
      required: true
      schema:
        type: integer
        format: int64
        minimum: 1
  responses:
    BadRequest:
      description: Request validation failed.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            error: invalid identifier
            timestamp: '2026-03-17T09:12:34Z'
    NotFound:
      description: The requested resource does not exist.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            error: resource not found
            timestamp: '2026-03-17T09:12:34Z'
    InternalServerError:
      description: The server failed to read or prepare the requested data.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            error: failed to fetch geokret
            timestamp: '2026-03-17T09:12:34Z'
    ServiceUnavailableHealth:
      description: Health check degraded because the database is unavailable.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/HealthDegradedStatus'
          example:
            status: degraded
            error: database_unavailable
  schemas:
    RootInfo:
      type: object
      required: [name, version, docs, openapi, health, metrics, root]
      properties:
        name:
          type: string
        version:
          type: string
        docs:
          type: string
        openapi:
          type: string
        health:
          type: string
        metrics:
          type: string
        root:
          type: string
    HealtzStatus:
      type: object
      required: [status, serverTime]
      properties:
        status:
          type: string
          enum: [ok]
        serverTime:
          type: string
          format: date-time
      example:
        status: ok
        serverTime: '2026-03-17T09:12:34Z'
    HealthStatus:
      type: object
      required: [status, activeWsClients, serverTime]
      properties:
        status:
          type: string
          enum: [ok]
        activeWsClients:
          type: integer
        serverTime:
          type: string
          format: date-time
    HealthDegradedStatus:
      type: object
      required: [status, error]
      properties:
        status:
          type: string
          enum: [degraded]
        error:
          type: string
          enum: [database_unavailable]
    ErrorResponse:
      type: object
      required: [error, timestamp]
      properties:
        error:
          type: string
        timestamp:
          type: string
          format: date-time
    PaginationMeta:
      type: object
      required: [limit, offset, count]
      properties:
        limit:
          type: integer
        offset:
          type: integer
        count:
          type: integer
    ResponseMeta:
      type: object
      required: [requestedAt, queryMs, pagination]
      properties:
        requestedAt:
          type: string
          format: date-time
        queryMs:
          type: integer
          format: int64
        pagination:
          $ref: '#/components/schemas/PaginationMeta'
    EnvelopeBase:
      type: object
      required: [data, meta]
      properties:
        data: {}
        meta:
          $ref: '#/components/schemas/ResponseMeta'
    GeoJSONPoint:
      type: object
      required: [type, coordinates]
      properties:
        type:
          type: string
          enum: [Point]
        coordinates:
          type: array
          minItems: 2
          maxItems: 2
          items:
            type: number
            format: double
      example:
        type: Point
        coordinates: [10.04402, 53.59728]
    GeoJSONFeature:
      type: object
      required: [type, geometry, properties]
      properties:
        type:
          type: string
          enum: [Feature]
        geometry:
          $ref: '#/components/schemas/GeoJSONPoint'
        properties:
          type: object
          additionalProperties: true
      example:
        type: Feature
        geometry:
          type: Point
          coordinates: [10.04402, 53.59728]
        properties:
          moveId: 1001
          movedOn: '2024-05-04T10:00:00Z'
          moveType: 0
          country: DE
          waypoint: GC12345
    GeoJSONFeatureCollection:
      type: object
      required: [type, features]
      properties:
        type:
          type: string
          enum: [FeatureCollection]
        features:
          type: array
          items:
            $ref: '#/components/schemas/GeoJSONFeature'
    PictureTypeStats:
      type: object
      properties:
