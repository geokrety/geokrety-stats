components:
  parameters:
    LimitParam:
      in: query
      name: limit
      description: Maximum number of items to return. Default 20, maximum 1000.
      required: false
      schema:
        type: integer
        minimum: 1
        maximum: 1000
        default: 20
    OffsetParam:
      in: query
      name: offset
      description: Zero-based starting offset for paginated responses. Default 0.
      required: false
      schema:
        type: integer
        minimum: 0
        default: 0
    SearchQueryParam:
      in: query
      name: q
      description: Search text. Must be at least 2 characters long.
      required: true
      schema:
        type: string
        minLength: 2
      example: gk
    GeokretIdParam:
      in: path
      name: gkid
      description: 'GeoKret public identifier. Accepts numeric decimal (e.g., 1),
        bare

        hexadecimal (e.g., 00FF), or GK-prefixed hexadecimal format (e.g.,

        GK0001, GKFFFF).

        Parsing is case-insensitive. Bare digit-only values without a leading zero

        are treated as decimal, while zero-padded digit-only values are treated as

        hexadecimal.

        '
      required: true
      schema:
        type: string
        pattern: ^(?:[Gg][Kk])?0*[1-9A-Fa-f][0-9A-Fa-f]*$
      examples:
        numeric:
          value: '1'
          description: Numeric decimal form
        bareHex:
          value: 00FF
          description: Hexadecimal form without the GK prefix
        hexPrefixed:
          value: GK0001
          description: GK-prefixed hexadecimal form
        largeHex:
          value: GKFFFF
          description: Maximum 16-bit hex value
    MoveIdParam:
      in: path
      name: moveId
      description: Internal numeric move identifier.
      required: true
      schema:
        type: integer
        format: int64
        minimum: 1
    UserIdParam:
      in: path
      name: id
      description: Internal numeric user identifier.
      required: true
      schema:
        type: integer
        format: int64
        minimum: 1
    CountryCodeParam:
      in: path
      name: code
      description: Uppercase ISO-3166 alpha-2 country code.
      required: true
      schema:
        type: string
        minLength: 2
        maxLength: 2
        pattern: ^[A-Z]{2}$
      example: PL
    WaypointCodeParam:
      in: path
      name: code
      description: Waypoint code or source-specific cache identifier.
      required: true
      schema:
        type: string
        minLength: 2
        maxLength: 32
        pattern: ^[A-Za-z0-9_-]{2,32}$
      example: GC12345
    PictureIdParam:
      in: path
      name: id
      description: Internal numeric picture identifier.
      required: true
      schema:
        type: integer
        format: int64
        minimum: 1
  responses:
    BadRequest:
      description: Request validation failed.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            error: invalid identifier
            timestamp: '2026-03-17T09:12:34Z'
        application/xml:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            error: invalid identifier
            timestamp: '2026-03-17T09:12:34Z'
    NotFound:
      description: The requested resource does not exist.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            error: resource not found
            timestamp: '2026-03-17T09:12:34Z'
        application/xml:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            error: resource not found
            timestamp: '2026-03-17T09:12:34Z'
    InternalServerError:
      description: The server failed to read or prepare the requested data.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            error: failed to fetch resource
            timestamp: '2026-03-17T09:12:34Z'
        application/xml:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            error: failed to fetch resource
            timestamp: '2026-03-17T09:12:34Z'
    ServiceUnavailableHealth:
      description: Health check degraded because the database is unavailable.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/HealthDegradedStatus'
          example:
            status: degraded
            error: database_unavailable
        application/xml:
          schema:
            $ref: '#/components/schemas/HealthDegradedStatus'
          example:
            status: degraded
            error: database_unavailable
  schemas:
    RootInfo:
      type: object
      xml:
        name: RootInfo
      required:
      - name
      - version
      - docs
      - openapi
      - health
      - metrics
      - root
      properties:
        name:
          type: string
        version:
          type: string
        docs:
          type: string
        openapi:
          type: string
        health:
          type: string
        metrics:
          type: string
        root:
          type: string
    HealtzStatus:
      type: object
      xml:
        name: HealtzStatus
      required:
      - status
      - serverTime
      properties:
        status:
          type: string
          enum:
          - ok
        serverTime:
          type: string
          format: date-time
      example:
        status: ok
        serverTime: '2026-03-17T09:12:34Z'
    HealthStatus:
      type: object
      xml:
        name: HealthStatus
      required:
      - status
      - activeWsClients
      - serverTime
      properties:
        status:
          type: string
          enum:
          - ok
        activeWsClients:
          type: integer
        serverTime:
          type: string
          format: date-time
    HealthDegradedStatus:
      type: object
      xml:
        name: HealthStatus
      required:
      - status
      - error
      properties:
        status:
          type: string
          enum:
          - degraded
        error:
          type: string
          enum:
          - database_unavailable
    ErrorResponse:
      type: object
      xml:
        name: ErrorResponse
      required:
      - error
      - timestamp
      properties:
        error:
          type: string
          description: Human-readable error message
        timestamp:
          type: string
          format: date-time
          description: Timestamp when the error occurred
    PaginationMeta:
      type: object
      xml:
        name: PaginationMeta
      required:
      - limit
      - offset
      - count
      properties:
        limit:
          type: integer
          description: Requested page size
        offset:
          type: integer
          description: Requested start offset
        count:
          type: integer
          description: Actual count of items returned
    ResponseMeta:
      type: object
      xml:
        name: ResponseMeta
      required:
      - requestedAt
      - queryMs
      - pagination
      properties:
        requestedAt:
          type: string
          format: date-time
          description: Server-side timestamp of request handling
        queryMs:
          type: integer
          description: Milliseconds spent executing the database query
        pagination:
          $ref: '#/components/schemas/PaginationMeta'
    EnvelopeBase:
      type: object
      xml:
        name: Envelope
      required:
      - data
      - meta
      properties:
        data:
          description: Response payload (type depends on endpoint)
        meta:
          $ref: '#/components/schemas/ResponseMeta'
    GeoJSONPoint:
      type: object
      required:
      - type
      - coordinates
      properties:
        type:
          type: string
          enum:
          - Point
        coordinates:
          type: array
          minItems: 2
          maxItems: 2
          items:
            type: number
          example:
          - 10.04402
          - 53.59728
    GeoJSONFeature:
      type: object
