openapi: 3.0.3
info:
  title: GeoKrety Stats API
  version: 3.0.0
  description: Read-only API for GeoKrety statistics, activity feeds, and visualization workloads.
servers:
  - url: http://localhost:7415
paths:
  /health:
    get:
      summary: Health check
      responses:
        '200':
          description: Service healthy
  /api/v3/stats/kpis:
    get:
      summary: Global KPI counters
      responses:
        '200':
          description: KPI payload
  /api/v3/stats/countries:
    get:
      summary: Country leaderboard and map aggregates
      parameters:
        - in: query
          name: limit
          schema: { type: integer, minimum: 1, maximum: 1000 }
        - in: query
          name: offset
          schema: { type: integer, minimum: 0 }
      responses:
        '200':
          description: Countries payload
  /api/v3/stats/leaderboard:
    get:
      summary: User leaderboard
      parameters:
        - in: query
          name: limit
          schema: { type: integer, minimum: 1, maximum: 1000 }
        - in: query
          name: offset
          schema: { type: integer, minimum: 0 }
      responses:
        '200':
          description: Leaderboard payload
  /api/v3/geokrety/recent-moves:
    get:
      summary: Recent GeoKrety moves
      responses:
        '200':
          description: Recent moves payload
  /api/v3/geokrety/recent-born:
    get:
      summary: Recently created GeoKrety
      responses:
        '200':
          description: Recent born payload
  /api/v3/geokrety/recent-loved:
    get:
      summary: Recently loved GeoKrety
      responses:
        '200':
          description: Recent loved payload
  /api/v3/geokrety/recent-watched:
    get:
      summary: Recently watched GeoKrety
      responses:
        '200':
          description: Recent watched payload
  /api/v3/countries/recent-active:
    get:
      summary: Recently active countries
      responses:
        '200':
          description: Active countries payload
  /api/v3/waypoints/recent-active:
    get:
      summary: Recently active waypoints
      responses:
        '200':
          description: Active waypoints payload
  /api/v3/users/recent-registered:
    get:
      summary: Recently registered users
      responses:
        '200':
          description: Recent registered users payload
  /api/v3/users/recent-active:
    get:
      summary: Recently active users
      responses:
        '200':
          description: Recent active users payload
components:
  schemas:
    Envelope:
      type: object
      properties:
        data:
          type: object
        meta:
          type: object
          properties:
            requestedAt: { type: string, format: date-time }
            queryMs: { type: integer }
            pagination:
              type: object
              properties:
                limit: { type: integer }
                offset: { type: integer }
                count: { type: integer }
