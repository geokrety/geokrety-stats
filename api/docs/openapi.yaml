openapi: 3.0.3
info:
  title: GeoKrety Stats API
  version: 3.1.0
  description: "Read-only API for GeoKrety statistics,\n    activity feeds,\nentity\
    \ exploration, and visualization workloads.\n\nEvery `/api/v3/...` JSON endpoint\
    \ returns a response envelope with `data`\nand `meta`. List endpoints support\
    \ `limit` and `offset` pagination.\nSearch endpoints require a `q` query parameter\
    \ of at least 2 characters.\n\n## GeoKret Public Identifiers (GKID)\n\nGeoKrety\
    \ endpoints accept public identifiers in three forms:\n- **Numeric decimal**:\
    \ `1`, `123`, `65535` (direct GKID number)\n- **Bare hexadecimal**: `0001`, `00FF`,\
    \ `FFFF` (hex without the `GK` prefix)\n- **GK-prefixed hexadecimal**: `GK0001`,\
    \ `GK00FF`, `GKFFFF`\n  (padded hex representation)\n\nParsing is case-insensitive.\
    \ Digit-only inputs without a leading zero are\ntreated as decimal, while zero-padded\
    \ digit-only inputs are treated as\nhexadecimal.\n\nAll forms resolve to the same\
    \ GeoKret. Examples:\n- `/api/v3/geokrety/1` and `/api/v3/geokrety/GK0001` fetch\
    \ the same GeoKret\n- `/api/v3/geokrety/00FF` and `/api/v3/geokrety/GK00FF` fetch\
    \ the same GeoKret\n- `/api/v3/geokrety/255` and `/api/v3/geokrety/GK00FF` are\
    \ equivalent"
servers:
- url: http://192.168.130.65:7415
  description: Local network development server
- url: http://localhost:7415
  description: Local development server
tags:
- name: System
  description: Service metadata, health checks, metrics, and websocket entrypoint
- name: Stats
  description: Global graph and leaderboard datasets
- name: Geokrety
  description: GeoKret entity details, feeds, graphs, and map payloads
- name: Countries
  description: Country-level aggregates and currently spotted GeoKrety
- name: Waypoints
  description: Waypoint search, details, and spotted or historical GeoKrety
- name: Users
  description: User details, activity, relationships, collections, and graphs
- name: Pictures
  description: Read-only picture metadata
paths:
  /:
    get:
      tags:
      - System
      operationId: getRootInfo
      summary: API root metadata
      description: Returns a compact self-describing payload for the running API instance.
      responses:
        '200':
          description: Root metadata payload
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RootInfo'
              example:
                name: GeoKrety Stats API
                version: v3
                docs: /docs
                openapi: /openapi.yaml
                health: /health
                metrics: /metrics
                root: /api/v3
            application/xml:
              schema:
                $ref: '#/components/schemas/RootInfo'
              example: <RootInfo><name>GeoKrety Stats API</name><version>v3</version><docs>/docs</docs><openapi>/openapi.yaml</openapi><health>/health</health><metrics>/metrics</metrics><root>/api/v3</root></RootInfo>
  /healtz:
    get:
      tags:
      - System
      operationId: getLiveness
      summary: Liveness check
      description: Lightweight process liveness probe without database dependency.
      responses:
        '200':
          description: Service process is alive
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealtzStatus'
            application/xml:
              schema:
                $ref: '#/components/schemas/HealtzStatus'
  /health:
    get:
      tags:
      - System
      operationId: getHealth
      summary: Health check
      description: Comprehensive health check including PostgreSQL connectivity and
        active websocket client count.
      responses:
        '200':
          description: Service and database are healthy
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthStatus'
              example:
                status: ok
                activeWsClients: 0
                serverTime: '2026-03-16T20:47:17Z'
            application/xml:
              schema:
                $ref: '#/components/schemas/HealthStatus'
              example: <HealthStatus><status>ok</status><activeWsClients>0</activeWsClients><serverTime>2026-03-16T20:47:17Z</serverTime></HealthStatus>
        '503':
          $ref: '#/components/responses/ServiceUnavailableHealth'
  /metrics:
    get:
      tags:
      - System
      operationId: getPrometheusMetrics
      summary: Prometheus metrics endpoint
      description: Exposes Prometheus text exposition format metrics.
      responses:
        '200':
          description: Prometheus metrics payload
          content:
            text/plain:
              schema:
                type: string
              example: '# HELP http_requests_total Total number of HTTP requests.

                # TYPE http_requests_total counter

                http_requests_total{method="GET",path="/health",status="200"} 12

                '
  /ws:
    get:
      tags:
      - System
      operationId: openWebsocket
      summary: WebSocket upgrade endpoint
      description: Upgrades the connection to a websocket stream for live hub events.
      responses:
        '101':
          description: WebSocket protocol upgrade completed
  /openapi.yaml:
    get:
      tags:
      - System
      operationId: getOpenApiDocument
      summary: OpenAPI document
      description: Serves this OpenAPI contract as YAML when swagger support is enabled.
      responses:
        '200':
          description: OpenAPI YAML document
          content:
            application/yaml:
              schema:
                type: string
