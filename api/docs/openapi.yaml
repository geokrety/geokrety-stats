openapi: 3.0.3
info:
  title: GeoKrety Stats API
  version: 3.1.0
  description: |
    Read-only API for GeoKrety statistics, activity feeds, entity exploration, and visualization workloads.

    Every `/api/v3/...` JSON endpoint returns a response envelope with `data` and `meta`.
    List endpoints support `limit` and `offset`. Search endpoints require a `q` query parameter of at least 2 characters.
servers:
  - url: http://localhost:7415
    description: Local development server
  - url: http://192.168.130.65:7415
    description: Local network development server
tags:
  - name: System
    description: Service metadata, health checks, metrics, and websocket entrypoint
  - name: Stats
    description: Global graph and leaderboard datasets
  - name: Geokrety
    description: GeoKret entity details, feeds, graphs, and map payloads
  - name: Countries
    description: Country-level aggregates and currently spotted GeoKrety
  - name: Waypoints
    description: Waypoint search, details, and spotted or historical GeoKrety
  - name: Users
    description: User details, activity, relationships, collections, and graphs
  - name: Pictures
    description: Read-only picture metadata
paths:
  /:
    get:
      tags: [System]
      operationId: getRootInfo
      summary: API root metadata
      description: Returns a compact self-describing payload for the running API instance.
      responses:
        '200':
          description: Root metadata payload
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RootInfo'
              example:
                name: GeoKrety Stats API
                version: v3
                docs: /docs
                openapi: /openapi.yaml
                health: /health
                metrics: /metrics
                root: /api/v3
  /healtz:
    get:
      tags: [System]
      operationId: getLiveness
      summary: Liveness check
      description: Lightweight process liveness probe without database dependency.
      responses:
        '200':
          description: Service process is alive
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealtzStatus'
  /health:
    get:
      tags: [System]
      operationId: getHealth
      summary: Health check
      description: Comprehensive health check including PostgreSQL connectivity and active websocket client count.
      responses:
        '200':
          description: Service and database are healthy
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthStatus'
              example:
                status: ok
                activeWsClients: 0
                serverTime: '2026-03-16T20:47:17Z'
        '503':
          $ref: '#/components/responses/ServiceUnavailableHealth'
  /metrics:
    get:
      tags: [System]
      operationId: getPrometheusMetrics
      summary: Prometheus metrics endpoint
      description: Exposes Prometheus text exposition format metrics.
      responses:
        '200':
          description: Prometheus metrics payload
          content:
            text/plain:
              schema:
                type: string
              example: |
                # HELP http_requests_total Total number of HTTP requests.
                # TYPE http_requests_total counter
                http_requests_total{method="GET",path="/health",status="200"} 12
  /ws:
    get:
      tags: [System]
      operationId: openWebsocket
      summary: WebSocket upgrade endpoint
      description: Upgrades the connection to a websocket stream for live hub events.
      responses:
        '101':
          description: WebSocket protocol upgrade completed
  /openapi.yaml:
    get:
      tags: [System]
      operationId: getOpenApiDocument
      summary: OpenAPI document
      description: Serves this OpenAPI contract as YAML when swagger support is enabled.
      responses:
        '200':
          description: OpenAPI YAML document
          content:
            application/yaml:
              schema:
                type: string
  /api/v3/stats/kpis:
    get:
      tags: [Stats]
      operationId: getStatsKpis
      summary: Global KPI counters
      responses:
        '200':
          description: Global KPI payload
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/EnvelopeBase'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/GlobalStats'
              example:
                data:
                  totalGeokrety: 108950
                  totalGeokretyHidden: 55368
                  totalMoves: 6926419
                  movesLast30Days: 19957
                  registeredUsers: 36410
                  activeUsers: 16
                  activeUsersLast30d: 214
                  countriesReached: 209
                  picturesUploaded: 69213
                  picturesByType:
                    geokretAvatars: 44806
                    geokretMoves: 23505
                    userAvatars: 902
                  geokretyByType:
                    traditional: 96908
                    book: 1161
                    human: 1490
                    coin: 5644
                    kretypost: 850
                    pebble: 27
                    car: 10
                    playingcard: 2826
                    dogtag: 3
                    jigsaw: 16
                    easteregg: 15
                  movesByType:
                    dropped: 348495
                    grabbed: 253359
                    commented: 4038
                    seen: 39396
                    archived: 9133
                    dipped: 6271998
                meta:
                  requestedAt: '2026-03-16T20:47:17Z'
                  queryMs: 90
                  pagination:
                    limit: 1
                    offset: 0
                    count: 1
        '500':
          $ref: '#/components/responses/InternalServerError'
