components:
  parameters:
    LimitParam:
      in: query
      name: limit
      description: Maximum number of items to return. Cursor-paginated endpoints default
        to 20 and reject values above the endpoint-specific maximum.
      required: false
      schema:
        type: integer
        minimum: 1
        maximum: 1000
        default: 20
    CursorParam:
      in: query
      name: cursor
      description: Opaque cursor token returned in `links.next`. Do not construct
        or modify this value on the client.
      required: false
      schema:
        type: string
    OffsetParam:
      in: query
      name: offset
      deprecated: true
      description: Zero-based starting offset for paginated responses. Default 0.
      required: false
      schema:
        type: integer
        minimum: 0
        default: 0
    SearchQueryParam:
      in: query
      name: q
      description: Search text. Must be at least 2 characters long.
      required: true
      schema:
        type: string
        minLength: 2
      example: gk
    GeokretIdsParam:
      in: query
      name: ids
      description: Optional comma-separated list of public GeoKret identifiers. When
        provided, the endpoint returns exactly the requested resources and ignores
        cursor pagination.
      required: false
      schema:
        type: string
        pattern: ^(?:\s*(?:[Gg][Kk])?0*[1-9A-Fa-f][0-9A-Fa-f]*\s*)(?:,\s*(?:[Gg][Kk])?0*[1-9A-Fa-f][0-9A-Fa-f]*\s*)*$
      example: GK0001,GK00FF
    MoveIdsParam:
      in: query
      name: ids
      description: Optional comma-separated list of numeric move identifiers. When
        provided, the endpoint returns exactly the requested move resources and ignores
        cursor pagination.
      required: false
      schema:
        type: string
        pattern: ^\s*[1-9][0-9]*(?:\s*,\s*[1-9][0-9]*)*\s*$
      example: 10,11,15
    CountryIdsParam:
      in: query
      name: ids
      description: Optional comma-separated list of ISO-3166 alpha-2 country codes.
        When provided, the endpoint returns exactly the requested country resources
        and ignores cursor pagination.
      required: false
      schema:
        type: string
        pattern: ^\s*[A-Za-z]{2}(?:\s*,\s*[A-Za-z]{2})*\s*$
      example: PL,DE,FR
    UserIdsParam:
      in: query
      name: ids
      description: Optional comma-separated list of numeric user identifiers. When
        provided, the endpoint returns exactly the requested user resources and ignores
        cursor pagination.
      required: false
      schema:
        type: string
        pattern: ^\s*[1-9][0-9]*(?:\s*,\s*[1-9][0-9]*)*\s*$
      example: 1,42,99
    PictureIdsParam:
      in: query
      name: ids
      description: Optional comma-separated list of numeric picture identifiers. When
        provided, the endpoint returns exactly the requested picture resources and
        ignores cursor pagination.
      required: false
      schema:
        type: string
        pattern: ^\s*[1-9][0-9]*(?:\s*,\s*[1-9][0-9]*)*\s*$
      example: 5,6,7
    GeokretIdParam:
      in: path
      name: gkid
      description: 'GeoKret public identifier. Accepts numeric decimal (e.g., 1),
        bare

        hexadecimal (e.g., 00FF), or GK-prefixed hexadecimal format (e.g.,

        GK0001, GKFFFF).

        Parsing is case-insensitive. Bare digit-only values without a leading zero

        are treated as decimal, while zero-padded digit-only values are treated as

        hexadecimal.

        '
      required: true
      schema:
        type: string
        pattern: ^(?:[Gg][Kk])?0*[1-9A-Fa-f][0-9A-Fa-f]*$
      examples:
        numeric:
          value: '1'
          description: Numeric decimal form
        bareHex:
          value: 00FF
          description: Hexadecimal form without the GK prefix
        hexPrefixed:
          value: GK0001
          description: GK-prefixed hexadecimal form
        largeHex:
          value: GKFFFF
          description: Maximum 16-bit hex value
    MoveIdParam:
      in: path
      name: moveId
      description: Internal numeric move identifier.
      required: true
      schema:
        type: integer
        format: int64
        minimum: 1
    UserIdParam:
      in: path
      name: id
      description: Internal numeric user identifier.
      required: true
      schema:
        type: integer
        format: int64
        minimum: 1
    CountryCodeParam:
      in: path
      name: code
      description: Uppercase ISO-3166 alpha-2 country code.
      required: true
      schema:
        type: string
        minLength: 2
        maxLength: 2
        pattern: ^[A-Z]{2}$
      example: PL
    WaypointCodeParam:
      in: path
      name: code
      description: Waypoint code or source-specific cache identifier.
      required: true
      schema:
        type: string
        minLength: 2
        maxLength: 32
        pattern: ^[A-Za-z0-9_-]{2,32}$
      example: OC146C3
    MoveResourceIdParam:
      in: path
      name: id
      description: Internal numeric move identifier.
      required: true
      schema:
        type: integer
        format: int64
        minimum: 1
    GeokretFilterParam:
      in: query
      name: geokret
      description: Filter by a public GeoKret identifier.
      required: false
      schema:
        type: string
        pattern: ^(?:[Gg][Kk])?0*[1-9A-Fa-f][0-9A-Fa-f]*$
      example: GK0001
    UserFilterParam:
      in: query
      name: user
      description: Filter by an internal numeric user identifier.
      required: false
      schema:
        type: integer
        format: int64
        minimum: 1
      example: 42
    CountryFilterParam:
      in: query
      name: country
      description: Filter by an ISO-3166 alpha-2 country code.
      required: false
      schema:
        type: string
        minLength: 2
        maxLength: 2
        pattern: ^[A-Za-z]{2}$
      example: PL
    WaypointFilterParam:
      in: query
      name: waypoint
      description: Filter by a waypoint code.
      required: false
      schema:
        type: string
        minLength: 2
        maxLength: 32
        pattern: ^[A-Za-z0-9_-]{2,32}$
      example: OC146C3
    MoveFilterParam:
      in: query
      name: move
      description: Filter pictures by an internal numeric move identifier.
      required: false
      schema:
        type: integer
        format: int64
        minimum: 1
      example: 9
    DateFromParam:
      in: query
      name: date_from
      description: Inclusive lower bound for move date filtering.
      required: false
      schema:
        type: string
        format: date
      example: '2026-03-01'
    DateToParam:
      in: query
      name: date_to
      description: Inclusive upper bound for move date filtering.
      required: false
      schema:
        type: string
        format: date
      example: '2026-03-29'
    PictureIdParam:
      in: path
      name: id
      description: Internal numeric picture identifier.
      required: true
      schema:
        type: integer
        format: int64
        minimum: 1
    FilterGeokretNameParam:
      in: query
      name: filter[name]
      description: Filter GeoKrety by case-insensitive name fragment.
      required: false
      schema:
        type: string
    FilterGeokretOwnerParam:
      in: query
      name: filter[owner_id]
      description: Filter GeoKrety by internal owner user identifier.
      required: false
      schema:
        type: integer
        format: int64
        minimum: 1
    FilterUserNameParam:
      in: query
      name: filter[username]
      description: Filter users by case-insensitive username fragment.
      required: false
      schema:
        type: string
    FilterCountryCodesParam:
      in: query
      name: filter[country]
      description: Filter countries by a comma-separated list of ISO-3166 alpha-2
        country codes.
      required: false
      schema:
        type: string
        pattern: ^[A-Za-z]{2}(?:\s*,\s*[A-Za-z]{2})*$
      example: PL,DE
    FilterMoveGeokretParam:
      in: query
      name: filter[geokret]
      description: Filter moves by a public GeoKret identifier.
      required: false
      schema:
        type: string
        pattern: ^(?:[Gg][Kk])?0*[1-9A-Fa-f][0-9A-Fa-f]*$
      example: GK0001
    FilterMoveUserParam:
      in: query
      name: filter[user]
      description: Filter moves by an internal user identifier.
      required: false
      schema:
        type: integer
        format: int64
        minimum: 1
      example: 42
    FilterMoveCountryParam:
      in: query
      name: filter[country]
      description: Filter moves by an ISO-3166 alpha-2 country code.
      required: false
      schema:
        type: string
        minLength: 2
        maxLength: 2
        pattern: ^[A-Za-z]{2}$
      example: PL
    FilterMoveWaypointParam:
      in: query
      name: filter[waypoint]
      description: Filter moves by waypoint code.
      required: false
      schema:
        type: string
        minLength: 2
        maxLength: 32
        pattern: ^[A-Za-z0-9_-]{2,32}$
      example: OC146C3
    FilterMoveDateFromParam:
      in: query
      name: filter[date_from]
      description: Inclusive lower bound for move date filtering.
      required: false
      schema:
        type: string
        format: date
      example: '2026-03-01'
    FilterMoveDateToParam:
      in: query
      name: filter[date_to]
      description: Inclusive upper bound for move date filtering.
      required: false
      schema:
        type: string
        format: date
      example: '2026-03-29'
    FilterPictureGeokretParam:
      in: query
      name: filter[geokret]
      description: Filter pictures by a public GeoKret identifier.
      required: false
      schema:
        type: string
        pattern: ^(?:[Gg][Kk])?0*[1-9A-Fa-f][0-9A-Fa-f]*$
      example: GK0001
    FilterPictureMoveParam:
      in: query
      name: filter[move]
      description: Filter pictures by an internal move identifier.
      required: false
      schema:
        type: integer
        format: int64
        minimum: 1
      example: 9
    FilterPictureUserParam:
      in: query
      name: filter[user]
      description: Filter pictures by an internal user identifier.
      required: false
      schema:
        type: integer
        format: int64
        minimum: 1
      example: 42
    GeokretSortParam:
      in: query
      name: sort
      description: Sort GeoKret collections. Prefix with `-` for descending order.
      required: false
      schema:
        type: string
        enum:
        - name
        - -name
        - born_at
        - -born_at
        - last_move_at
        - -last_move_at
    UserSortParam:
      in: query
      name: sort
      description: Sort user collections. Prefix with `-` for descending order.
      required: false
      schema:
        type: string
        enum:
        - username
        - -username
        - joined_at
        - -joined_at
        - last_move_at
        - -last_move_at
    MoveSortParam:
      in: query
      name: sort
      description: Sort move collections. Prefix with `-` for descending order.
      required: false
      schema:
        type: string
        enum:
        - date
        - -date
        - id
        - -id
    PictureSortParam:
      in: query
      name: sort
      description: Sort picture collections. Prefix with `-` for descending order.
      required: false
      schema:
        type: string
        enum:
        - created_on
        - -created_on
        - id
        - -id
    CountrySortParam:
      in: query
      name: sort
      description: Sort country collections. Prefix with `-` for descending order.
      required: false
      schema:
        type: string
        enum:
        - code
        - -code
        - name
        - -name
    LoverSortParam:
      in: query
      name: sort
      description: Sort the `loved-by` collection. Prefix with `-` for descending
        order.
      required: false
      schema:
        type: string
        enum:
        - loved_on_date
        - -loved_on_date
    WatcherSortParam:
      in: query
      name: sort
      description: Sort the `watched-by` collection. Prefix with `-` for descending
        order.
      required: false
      schema:
        type: string
        enum:
        - watched_on_date
        - -watched_on_date
    FinderSortParam:
      in: query
      name: sort
      description: Sort the `finders` collection. Prefix with `-` for descending order.
      required: false
      schema:
        type: string
        enum:
        - found_on_date
        - -found_on_date
    GeokretCountryVisitSortParam:
      in: query
      name: sort
      description: Sort GeoKret country visit collections. Prefix with `-` for descending
        order.
      required: false
      schema:
        type: string
        enum:
        - country_code
        - -country_code
        - first_visited_at
        - -first_visited_at
        - move_count
        - -move_count
    UserCountryVisitSortParam:
      in: query
      name: sort
      description: Sort user country visit collections. Prefix with `-` for descending
        order.
      required: false
      schema:
        type: string
        enum:
        - country_code
        - -country_code
        - first_visit
        - -first_visit
        - last_visit
        - -last_visit
        - move_count
        - -move_count
    WaypointVisitSortParam:
      in: query
      name: sort
      description: Sort waypoint visit collections. Prefix with `-` for descending
        order.
      required: false
      schema:
        type: string
        enum:
        - waypoint_code
        - -waypoint_code
        - first_visited_at
        - -first_visited_at
        - last_visited_at
        - -last_visited_at
        - visit_count
        - -visit_count
  responses:
    BadRequest:
      description: Request validation failed.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/JsonRestErrorDocument'
          example:
            error:
              code: BAD_REQUEST
              message: invalid identifier
            timestamp: '2026-03-17T09:12:34Z'
        application/xml:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            error: invalid identifier
            timestamp: '2026-03-17T09:12:34Z'
    NotFound:
      description: The requested resource does not exist.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/JsonRestErrorDocument'
          example:
            error:
              code: NOT_FOUND
              message: resource not found
            timestamp: '2026-03-17T09:12:34Z'
        application/xml:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            error: resource not found
            timestamp: '2026-03-17T09:12:34Z'
    InternalServerError:
      description: The server failed to read or prepare the requested data.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/JsonRestErrorDocument'
          example:
            error:
              code: INTERNAL_ERROR
              message: failed to fetch resource
            timestamp: '2026-03-17T09:12:34Z'
        application/xml:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            error: failed to fetch resource
            timestamp: '2026-03-17T09:12:34Z'
    ServiceUnavailableHealth:
      description: Health check degraded because the database is unavailable.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/HealthDegradedStatus'
          example:
            status: degraded
            error: database_unavailable
        application/xml:
          schema:
            $ref: '#/components/schemas/HealthDegradedStatus'
          example:
            status: degraded
            error: database_unavailable
  schemas:
    JsonRestResourceLinks:
      type: object
      additionalProperties: false
      properties:
        self:
          type: string
        related:
          type: string
    JsonRestDocumentLinks:
      type: object
      additionalProperties: false
      properties:
        self:
          type: string
        next:
          type: string
        prev:
          type: string
          nullable: true
        first:
          type: string
        last:
          type: string
    JsonRestIdentifier:
      type: object
      required:
      - type
      - id
      properties:
        type:
          type: string
        id:
          type: string
    JsonRestRelationshipData:
      $ref: '#/components/schemas/JsonRestIdentifier'
    JsonRestRelationship:
      type: object
      properties:
        data:
          $ref: '#/components/schemas/JsonRestRelationshipData'
        links:
          $ref: '#/components/schemas/JsonRestResourceLinks'
    JsonRestPageMeta:
      type: object
      properties:
        type:
          type: string
          enum:
          - cursor
          - page
        limit:
          type: integer
        has_more:
          type: boolean
        number:
          type: integer
        size:
          type: integer
        total_items:
          type: integer
        total_pages:
          type: integer
    JsonRestQueryMeta:
      type: object
      properties:
        filters:
          type: object
          additionalProperties: true
        sort:
          type: string
    JsonRestFilterCapability:
      type: object
      properties:
        type:
          type: string
        multi:
          type: boolean
        values:
          type: array
          items:
            type: string
        operators:
          type: array
          items:
            type: string
    JsonRestCapabilitiesMeta:
      type: object
      properties:
        filters:
          type: object
          additionalProperties:
            $ref: '#/components/schemas/JsonRestFilterCapability'
        sorts:
          type: array
          items:
            type: string
    JsonRestMeta:
      type: object
      required:
