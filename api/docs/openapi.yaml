openapi: 3.0.3
info:
  title: GeoKrety Stats API
  version: 3.1.0
  description: "Read-only API for GeoKrety statistics,\n    resource exploration.\n\
    \nThe `/api/v3/...` contract is JSON REST based: every JSON response uses\ntop-level\
    \ `data`, `meta`, and `links`, while resource objects expose `id`,\n`type`, `attributes`,\
    \ optional `relationships`, and resource-scoped\n`links.self`.\nCollection endpoints\
    \ are cursor-first for now: clients send `limit`, follow\n`links.next`, and continue\
    \ while `meta.has_more` is true. Search endpoints\nrequire a `q` query parameter\
    \ of at least 2 characters.\nThe public API surface was intentionally reduced\
    \ during the big-bang\nmigration: redundant activity, stats, alias, and visualization\
    \ endpoints were\nremoved so the stable contract centers on core resources and\
    \ scoped\ncollections.\n\n## GeoKret Public Identifiers (GKID)\n\nGeoKrety endpoints\
    \ accept public identifiers in three forms:\n- **Numeric decimal**: `1`, `123`,\
    \ `65535` (direct GKID number)\n- **Bare hexadecimal**: `0001`, `00FF`, `FFFF`\
    \ (hex without the `GK` prefix)\n- **GK-prefixed hexadecimal**: `GK0001`, `GK00FF`,\
    \ `GKFFFF`\n  (padded hex representation)\n\nParsing is case-insensitive. Digit-only\
    \ inputs without a leading zero are\ntreated as decimal, while zero-padded digit-only\
    \ inputs are treated as\nhexadecimal.\n\nAll forms resolve to the same GeoKret.\
    \ Examples:\n- `/api/v3/geokrety/1` and `/api/v3/geokrety/GK0001` fetch the same\
    \ GeoKret\n- `/api/v3/geokrety/00FF` and `/api/v3/geokrety/GK00FF` fetch the same\
    \ GeoKret\n- `/api/v3/geokrety/255` and `/api/v3/geokrety/GK00FF` are equivalent"
servers:
- url: http://192.168.130.65:7415
  description: Local network development server
- url: http://localhost:7415
  description: Local development server
tags:
- name: System
  description: Service metadata, health checks, metrics, and websocket entrypoint
- name: Geokrety
  description: GeoKret entities and their primary relationship collections
- name: Countries
  description: Country-level aggregates and currently spotted GeoKrety
- name: Waypoints
  description: Waypoint search, details, and spotted or historical GeoKrety
- name: Users
  description: User details, activity, relationships, collections, and graphs
- name: Pictures
