  # ── Leaderboard API ───────────────────────────────────────────────────────
  leaderboard-api:
    build:
      context: ./leaderboard-api
      dockerfile: Dockerfile
    restart: unless-stopped
    # depends_on:
    #   postgres:
    #     condition: service_healthy
    environment:
      GK_STATS_DB_URL:            postgres://${POSTGRES_USER:-geokrety}:${POSTGRES_PASSWORD:-geokrety}@192.168.130.65:5432/${POSTGRES_DB:-geokrety}?sslmode=disable
      API_SERVER_PORT:             8080
      API_SERVER_HOST:             0.0.0.0
      API_SERVER_ALLOW_ORIGINS:    "*"
      API_SERVER_REFRESH_INTERVAL: 30
      API_DATABASE_POOL_MAX:       20
      API_DATABASE_POOL_MIN:       2
    ports:
      - "8080:8080"
    # healthcheck:
    #   test: ["CMD-SHELL", "wget -qO- http://localhost:8080/health || exit 1"]
    #   interval: 15s
    #   timeout: 5s
    #   retries: 3

  # ── Leaderboard Dashboard – Production (nginx) ────────────────────────────
  leaderboard-dashboard:
    build:
      context: ./leaderboard-dashboard
      dockerfile: Dockerfile
      target: prod
    image: leaderboard-dashboard:prod
    restart: unless-stopped
    depends_on:
      - leaderboard-api
    ports:
      - "3000:80"
    profiles: ["prod"]  # Default: use with 'docker compose up' or 'docker compose --profile prod up'

  # ── Leaderboard Dashboard – Development (Vite with hot reload) ───────────
  leaderboard-dashboard-dev:
    build:
      context: ./leaderboard-dashboard
      dockerfile: Dockerfile
      target: dev
    image: leaderboard-dashboard:dev
    restart: unless-stopped
    depends_on:
      - leaderboard-api
    volumes:
      # Mount local source code for hot reload
      - ./leaderboard-dashboard/src:/app/src
      - ./leaderboard-dashboard/public:/app/public
      - ./leaderboard-dashboard/index.html:/app/index.html
      - ./leaderboard-dashboard/vite.config.js:/app/vite.config.js
      - ./leaderboard-dashboard/package.json:/app/package.json
      # Skip node_modules (use container's version)
      - /app/node_modules
    ports:
      - "3000:3000"      # Vite dev server (main)
      - "5173:5173"      # Vite HMR port (for hot module reload)
    environment:
      VITE_HMR_HOST: localhost
      VITE_HMR_PORT: 5173
      VITE_HMR_PROTOCOL: ws
    profiles: ["dev"]    # Use with 'docker compose --profile dev up'

